<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <style>
        body {
            font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif; 
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            
        }

        form {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            margin: 0 auto;

        }

        h2 {
            text-align: center;
            color: #333;
        }

        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }

        input[type="text"], input[type="email"], input[type="password"], input[type="date"], select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }

        textarea {
            height: 100px;
        }

        .checkbox-group input {
            margin-right: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .submit-btn {
            background-color: #4e4caf;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }

        .submit-btn:hover {
            background-color: #4e4caf;
        }
    </style>
</head>
<body>
    <form action="/submit" method="POST">
        <h2>Registration Form</h2>

        <div class="form-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" name="firstName" required minlength="2" maxlength="50" placeholder="Enter your first name">
        </div>

        <div class="form-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" name="lastName" required minlength="2" maxlength="50" placeholder="Enter your last name">
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required placeholder="Enter your email address">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required minlength="8" placeholder="Enter a password">
        </div>

        <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required minlength="8" placeholder="Confirm your password">
        </div>

        <div class="form-group">
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" name="dob" required>
        </div>

        <div class="form-group">
            <label>Gender</label>
            <label for="male">
                <input type="radio" id="male" name="gender" value="male" required> Male
            </label>
            <label for="female">
                <input type="radio" id="female" name="gender" value="female"> Female
            </label>
            <label for="other">
                <input type="radio" id="other" name="gender" value="other"> Other
            </label>
        </div>

        <div class="form-group checkbox-group">
            <label>Hobbies/Interests</label>
            <label for="reading">
                <input type="checkbox" id="reading" name="hobbies" value="reading"> Reading
            </label>
            <label for="traveling">
                <input type="checkbox" id="traveling" name="hobbies" value="traveling"> Traveling
            </label>
            <label for="sports">
                <input type="checkbox" id="sports" name="hobbies" value="sports"> Sports
            </label>
            <label for="music">
                <input type="checkbox" id="music" name="hobbies" value="music"> Music
            </label>
        </div>

        <div class="form-group">
            <label for="country">Country</label>
            <select id="country" name="country" required>
                <option value="">Select your country</option>
                <option value="USA">United States</option>
                <option value="Canada">Canada</option>
                <option value="UK">United Kingdom</option>
                <option value="India">India</option>
                <option value="Australia">Australia</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <div class="form-group">
            <label for="comments">Comments or Additional Information</label>
            <textarea id="comments" name="comments" placeholder="Enter any additional information or comments"></textarea>
        </div>

        <div class="form-group">
            <input type="submit" class="submit-btn" value="Submit">
        </div>
    </form>
</body>
</html>
